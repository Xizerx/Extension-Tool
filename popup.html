<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Auto Integrate Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Brand font */
    @font-face {
      font-family: "Euclid Circular B";
      src: url("brand/EuclidCircularB-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    :root{
      --c-teal:#00D7D2;
      --c-cyan:#05AFDC;
      --c-mint:#AAFFD2;
      --c-blue-1:#96BED2;
      --c-blue-2:#C8DCEB;
      --c-slate:#4B6478;
      --c-gray:#B9C8CD;
    }
    body{
      margin:0;
      font-family:"Euclid Circular B", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#0f172a;
      width:340px;
      background:#fff;
    }
    header{
      padding:16px 16px 8px;
      background:linear-gradient(135deg,var(--c-teal),var(--c-cyan));
      color:#04313a;
      position:relative;
    }
    header .brand{
      display:flex;align-items:center;gap:10px;
    }
    header img.logo{
      width:38px;height:38px;border-radius:10px; background:#fff;
      box-shadow:0 4px 12px rgba(0,0,0,.12);
    }
    header h1{
      margin:0;font-size:18px;line-height:1.1;color:#00333d;font-weight:700;
    }
    header .sub{
      margin-top:2px;font-size:12px;color:#083a48;opacity:.85;
    }

    .card{
      margin:12px; padding:12px; border-radius:14px; background:#fff;
      box-shadow:0 8px 20px rgba(0,0,0,.06), 0 1px 0 rgba(0,0,0,.05);
      border:1px solid rgba(0,0,0,.04);
    }
    .row{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .kvl{ display:grid; grid-template-columns: 110px 1fr; row-gap:6px; column-gap:10px; }

    .label{ color:#5b6b79; font-size:12px; }
    .value{ color:#0f172a; font-size:13px; font-weight:600; }

    .dot{
      width:10px;height:10px;border-radius:50%; background:#ef4444; /* red */
      box-shadow:0 0 0 2px rgba(0,0,0,.05);
    }
    .title{ font-size:14px; font-weight:700; color:#1f2937; }
    .muted{ color:#6b7280; font-size:12px; }

    .list{ max-height:180px; overflow:auto; margin-top:8px; }
    .li{
      padding:8px 8px; border-radius:10px; display:flex; gap:8px; align-items:flex-start;
      background:#f7fbfc; border:1px solid #e6f2f6; margin:6px 0;
    }
    .num{ width:1.5em; text-align:right; color:#6b7280; }
    .desc{ flex:1; word-break:break-word; color:#1f2937; }

    .actions{ display:flex; gap:8px; }
    button{
      border:none; border-radius:10px; padding:8px 10px; font-weight:600; cursor:pointer;
      background:var(--c-teal); color:#083a48;
    }
    button.secondary{ background:var(--c-blue-2); color:#244556; }
    .foot{
      text-align:center; font-size:11px; color:#637583; padding:8px 12px 12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img class="logo" src="brand/Element-Logomark.gif" alt="Element logo"/>
      <div>
        <h1>Auto Integrate Helper</h1>
          <div id="userName" class="sub">Toolbar overview</div>
      </div>
    </div>
  </header>

  <div class="card">
    <div class="row">
      <div class="title">Progress</div>
      <div class="row" style="gap:6px">
        <div id="dot" class="dot" aria-label="Status"></div>
        <div class="muted"><span id="count">0 / 0</span> • <span id="pct">0%</span></div>
      </div>
    </div>

    <div class="kvl" style="margin-top:10px">
      <div class="label">Repair Order ID</div><div class="value" id="ro">—</div>
      <div class="label">Invoice Number</div><div class="value" id="inv">—</div>
      <div class="label">URL</div><div class="value" id="url" style="font-weight:500; color:#2a5366; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">—</div>
    </div>

    <div class="row" style="margin-top:10px">
      <div class="title">Remaining</div>
      <div class="actions">
        <button id="refresh">Refresh</button>
      </div>
    </div>
    <div id="list" class="list"></div>
  </div>

  <div class="foot"><i>Move the World through Intelligent Mobility</i></div>


  <script src="popup.js"></script>
</body>
</html>
